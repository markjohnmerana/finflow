name: 'finflow'
version: '1.0.0'
config-version: 2

profile: 'finflow'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  finflow:
    bronze:
      +materialized: view
      +schema: bronze

    silver:
      +materialized: table
      +schema: silver

    gold:
      +materialized: table
      +schema: gold